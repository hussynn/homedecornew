<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Hero Slides | Aura Luxury Decor</title>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <!-- Design Styles -->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <!-- Layout root container -->
  <div id="admin-layout-root">
    
    <!-- Mobile header menu -->
    <div class="admin-mobile-header">
      <h2>AURA ADMIN</h2>
      <button class="admin-hamburger" id="admin-hamburger-toggle" aria-label="Toggle Menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <div class="admin-layout">
      <!-- Sidebar Navigation root container -->
      <aside class="admin-sidebar" id="admin-sidebar-nav"></aside>

      <!-- Main Panel viewport -->
      <main class="admin-main">
        <header class="admin-header">
          <h1>Hero Slider Banners</h1>
          <button type="button" class="btn-primary" id="add-slide-btn" style="padding: 10px 20px; width:auto;">
            <i class="fas fa-plus"></i> Add New Slide
          </button>
        </header>

        <!-- Slides Table Card -->
        <div class="table-card">
          <div class="table-header">
            <h3>Homepage Banners</h3>
          </div>
          
          <div class="admin-table-wrapper">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Preview Banner</th>
                  <th>Title / Caption</th>
                  <th>Subtitle</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="slides-table-body">
                <!-- Rendered dynamically -->
              </tbody>
            </table>
          </div>
        </div>

      </main>
    </div>

  </div>

  <!-- Add/Edit Slide Modal dialog -->
  <div class="admin-modal" id="slide-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Add Promo Slide</h3>
        <button class="close-modal-btn" id="close-slide-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="slide-form">
          <input type="hidden" id="edit-slide-id" value="">
          
          <div class="input-group" style="margin-bottom: 20px;">
            <label for="slide-title">Slide Heading Title *</label>
            <input type="text" id="slide-title" required placeholder="E.g., Elevate Your Living Space">
          </div>

          <div class="input-group" style="margin-bottom: 20px;">
            <label for="slide-subtitle">Slide Subtitle / Description</label>
            <input type="text" id="slide-subtitle" placeholder="E.g., Discover our premium handcrafted wallpapers">
          </div>

          <!-- Image upload wrapper -->
          <div class="input-group" style="margin-bottom: 20px;">
            <label>Banner Image * (High resolution, 1600x650 recommended)</label>
            <div class="image-upload-wrapper">
              <i class="fas fa-cloud-upload-alt upload-icon"></i>
              <div class="upload-text">Select banner background image</div>
              <div class="upload-hint">Supported formats: JPEG, PNG, WEBP (Max 2MB)</div>
              <input type="file" id="slide-image-file" accept="image/*">
            </div>
            
            <!-- Image previews -->
            <input type="hidden" id="slide-image-url" value="">
            <div class="image-preview-grid" id="slide-image-preview-container" style="display:none;">
              <div class="preview-thumb" style="aspect-ratio:16/7; width:220px; height:auto;">
                <img id="slide-preview-img" src="" alt="Slide preview">
                <button type="button" class="preview-remove-btn" id="remove-slide-img-btn">&times;</button>
              </div>
            </div>
          </div>

          <div style="display:flex; align-items:center; gap: 10px; margin-top:25px;">
            <input type="checkbox" id="slide-active" checked style="width:18px; height:18px; accent-color:var(--accent-gold);">
            <label for="slide-active" style="font-weight:600; font-size:0.9rem; cursor:pointer;">Active (Visible on home slider)</label>
          </div>

        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="close-modal-footer-btn" style="padding: 10px 20px;">Cancel</button>
        <button type="submit" form="slide-form" class="btn-primary" style="padding: 10px 20px; width:auto;">Save Banner</button>
      </div>
    </div>
  </div>

  <!-- Dashboard Script controllers module -->
  <script type="module" src="../js/admin-slides.js"></script>
</body>
</html>
