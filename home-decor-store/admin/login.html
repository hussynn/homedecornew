<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Aura Luxury Decor</title>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <!-- Core Layout Styles -->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-login-body">

  <div class="login-card">
    <div class="login-card-header">
      <h2>Aura Luxury Decor</h2>
      <p>Control Panel Administrator Sign In</p>
    </div>
    
    <div class="login-card-body">
      <form id="admin-login-form">
        
        <div class="input-group" style="margin-bottom: 20px;">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" required placeholder="owner@auraluxurydecor.com" style="background-color: var(--bg-off-white);">
        </div>

        <div class="input-group" style="margin-bottom: 25px;">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••" style="background-color: var(--bg-off-white);">
        </div>

        <button type="submit" class="btn-primary" style="width:100%">
          <i class="fas fa-sign-in-alt"></i> Login to Dashboard
        </button>

      </form>

      <!-- Tip info for Demo Fallback credentials -->
      <div style="margin-top:25px; padding:15px; background-color:rgba(197,168,128,0.1); border-radius:4px; font-size:0.8rem; color:#7D7262; border: 1px dashed var(--accent-gold);">
        <h4 style="font-weight:600; color:#3C3225; margin-bottom:5px;"><i class="fas fa-info-circle"></i> Developer Preview Tips:</h4>
        <p style="margin-bottom:5px;">If Firebase configuration is not completed yet, you can sign in using these offline credentials:</p>
        <p><strong>Email:</strong> <code style="background:#FFF; padding:2px 4px; border-radius:2px;">admin@auradecor.com</code></p>
        <p><strong>Password:</strong> <code style="background:#FFF; padding:2px 4px; border-radius:2px;">adminpassword</code></p>
      </div>
    </div>
  </div>

  <!-- Authenticator Logic Controller -->
  <script type="module">
    import { signInAdmin } from "../js/auth.js";
    import { showLoader, hideLoader, showToast } from "../js/ui.js";

    document.getElementById("admin-login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;

      showLoader();
      try {
        const user = await signInAdmin(email, password);
        showToast("Signed in successfully. Redirecting...", "success");
        setTimeout(() => {
          window.location.href = "./index.html";
        }, 1500);
      } catch (error) {
        showToast(error.message, "error");
      } finally {
        hideLoader();
      }
    });
  </script>
</body>
</html>
